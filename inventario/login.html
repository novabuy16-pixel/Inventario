<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pactra - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #121212;
            --bg-surface: rgba(30, 30, 30, 0.7);
            --primary: #FF7B00;
            --primary-hover: #e66a00;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(255, 123, 0, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 123, 0, 0.05), transparent 25%);
            overflow: hidden;
        }

        .login-container {
            background-color: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo-area {
            margin-bottom: 24px;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(255, 123, 0, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .error-msg {
            color: #ff5252;
            font-size: 13px;
            margin-top: 12px;
            min-height: 18px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo-area">
            <h1>Inventario Pactra</h1>
            <p>Acceso restringido</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" class="form-control" autocomplete="username" spellcheck="false"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password" required>
            </div>

            <div id="errorMsg" class="error-msg">Credenciales inválidas</div>

            <button type="submit" class="btn-primary" id="btnSubmit">Iniciar Sesión</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('errorMsg');

            btn.classList.add('loading');
            btn.textContent = 'Verificando...';
            errorMsg.style.display = 'none';

            try {
                // Determine API URL based on runtime environment (Capacitor vs Web)
                const isCapacitor = !!window.Capacitor?.isNativePlatform?.();
                const apiUrl = isCapacitor
                    ? 'https://inventario-1-83xv.onrender.com/api/login'
                    : '/api/login';

                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = 'Usuario o contraseña incorrectos';
                    errorMsg.style.display = 'block';
                    btn.classList.remove('loading');
                    btn.textContent = 'Iniciar Sesión';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
                errorMsg.style.display = 'block';
                btn.classList.remove('loading');
                btn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>

</html>
